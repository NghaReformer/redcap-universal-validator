name: parity

on:
  push:
  pull_request:

jobs:
  js-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: JS engine vs fixture (compute + normalize + scheme_ops)
        run: node tests/parity_js.cjs
      - name: Pooled fixture is up to date
        run: |
          node tests/gen_pooled_fixture.cjs
          git diff --exit-code tests/pooled_fixture.json \
            || (echo "pooled_fixture.json is stale — re-run node tests/gen_pooled_fixture.cjs and commit"; exit 1)
      - name: JS pooled parser vs fixture
        run: node tests/pooled_js.cjs
      - name: JS risky-pattern heuristic
        run: node tests/risky_js.cjs
      - name: JS config-error notice
        run: node tests/config_notice_js.cjs

  php-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring
      - name: PHP syntax check
        run: |
          php -l php/CheckCharacter.php
          php -l php/AnnotationRules.php
          php -l UniversalValidator.php
      - name: PHP port vs fixture (compute + normalize + scheme_ops)
        run: php tests/parity_php.php
      - name: PHP pooled parser vs fixture
        run: php tests/pooled_php.php
      - name: PHP risky-pattern heuristic + server behavior
        run: php tests/risky_php.php
      - name: PHP @UVALIDATE annotation parser
        run: php tests/annotation_php.php
      - name: PHP server-side audit (redcap_save_record) path
        run: php tests/hook_php.php
