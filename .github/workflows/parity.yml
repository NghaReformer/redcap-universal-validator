name: parity

on:
  push:
  pull_request:

# Nothing in CI writes to the repository.
permissions:
  contents: read

jobs:
  js-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: JS engine vs fixture (compute + normalize + scheme_ops)
        run: node tests/parity_js.cjs
      - name: Pooled fixture is up to date
        run: |
          node tests/gen_pooled_fixture.cjs
          git diff --exit-code tests/pooled_fixture.json \
            || (echo "pooled_fixture.json is stale — re-run node tests/gen_pooled_fixture.cjs and commit"; exit 1)
      - name: JS pooled parser vs fixture
        run: node tests/pooled_js.cjs
      - name: JS pooled chip rendering (severity colors + marks)
        run: node tests/pooled_dom_js.cjs
      - name: JS risky-pattern heuristic
        run: node tests/risky_js.cjs
      - name: JS "when" condition evaluator vs fixture
        run: node tests/when_js.cjs
      - name: JS "when" fuzz fixture is up to date
        run: |
          node tests/gen_when_fuzz.cjs
          git diff --exit-code tests/when_fuzz.json \
            || (echo "when_fuzz.json is stale — re-run node tests/gen_when_fuzz.cjs and commit"; exit 1)
      - name: JS "when" gate DOM contract (live refs, folded constants, fail-open)
        run: node tests/when_dom_js.cjs
      - name: JS branched validation DOM contract (active branch, else, conflict)
        run: node tests/branch_dom_js.cjs
      - name: JS constraint (@UVASSERT) DOM contract (assert test, compose, branches)
        run: node tests/constraint_dom_js.cjs
      - name: JS config-error notice
        run: node tests/config_notice_js.cjs
      - name: JS dispatcher config-error routing
        run: node tests/dispatch_notice_js.cjs
      - name: JS field DOM contract (a11y, debounce, survey muting, readonly)
        run: node tests/a11y_dom_js.cjs
      - name: Algorithm set is complete (fixture == JS registry == dropdown)
        run: node tests/algorithm_coverage_js.cjs
      - name: Derivation tracers match compute() on every fixture row
        run: node tests/explain_js.cjs

  php-parity:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # the declared php-version-min (7.4) through current, so the floor is
        # actually exercised, not just declared
        php: ['7.4', '8.1', '8.3']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f # 2.35.5
        with:
          php-version: '${{ matrix.php }}'
          extensions: mbstring, ctype
      - name: PHP syntax check
        run: |
          php -l php/CheckCharacter.php
          php -l php/AnnotationRules.php
          php -l php/Logic.php
          php -l php/Branching.php
          php -l UniversalValidator.php
      - name: PHP port vs fixture (compute + normalize + scheme_ops)
        run: php tests/parity_php.php
      - name: PHP pooled parser vs fixture
        run: php tests/pooled_php.php
      - name: PHP risky-pattern heuristic + server behavior
        run: php tests/risky_php.php
      - name: PHP "when" condition evaluator vs fixture
        run: php tests/when_php.php
      - name: PHP branch resolver (shared-field rules)
        run: php tests/branching_php.php
      - name: PHP "when" engine vs the JS twin (differential fuzz)
        run: php tests/when_fuzz_php.php
      - name: PHP @UVALIDATE annotation parser
        run: php tests/annotation_php.php
      - name: PHP server-side audit (redcap_save_record) path
        run: php tests/hook_php.php
      - name: Algorithm set is complete (fixture == PHP engine == allow-list == dropdown)
        run: php tests/algorithm_coverage_php.php

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build and verify the release-shaped archive
        run: |
          set -e
          VERSION=$(sed -n 's/^## \([0-9][0-9.]*\).*/\1/p' CHANGELOG.md | head -1)
          test -n "$VERSION" || { echo "could not read the version from CHANGELOG.md"; exit 1; }
          DIR="universal_validator_v${VERSION}"
          git archive --prefix="${DIR}/" -o "${DIR}.zip" HEAD
          unzip -q "${DIR}.zip" -d /tmp/pkg
          cd "/tmp/pkg/${DIR}"
          echo "--- package contents ---"
          find . -type f | sort
          for f in config.json UniversalValidator.php README.md LICENSE js/engine.js php/CheckCharacter.php php/AnnotationRules.php php/Logic.php php/Branching.php; do
            test -f "$f" || { echo "MISSING required file: $f"; exit 1; }
          done
          for d in .github reports; do
            test ! -e "$d" || { echo "development-only path shipped in the package: $d"; exit 1; }
          done
          python3 -m json.tool config.json > /dev/null
          grep -qF 'INSPIRE\\UniversalValidator' config.json \
            || { echo "config.json namespace mismatch"; exit 1; }
          grep -qF 'namespace INSPIRE\UniversalValidator;' UniversalValidator.php \
            || { echo "module class namespace mismatch"; exit 1; }
          echo "package ${DIR}.zip OK"
